  <!-- Hero Section -->

  </section>

  <!-- Feedback Form + Contact Info -->
  <section class="container my-5">
    <div class="row g-4">
      <!-- Feedback Form -->
      <div class="col-md-7">
        <div class="feed p-4 rounded ">
          <h2 class="mb-4">We’d love to hear from you</h2>
          <form>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input type="text" class="form-control" placeholder="Feedback / Query" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            <button type="submit" class="btn">Submit</button>
          </form>
        </div>
      </div>

      <!-- Contact Info -->
      <div class="col-md-5">
        <div class="contact-box rounded  p-4">
          <h3 class="Contact">Contact Us</h3>
          <p><strong>📍 Address:</strong> 123 Grand Street, Hyderabad</p>
          <p><strong>📞 Phone:</strong> +92 300 1234567</p>
          <p><strong>📧 Email:</strong> info@grandtheater.com</p>
          <hr>

            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3620.265089135128!2d67.07275981500239!3d24.86073428405464!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33e3be9e92a0b%3A0xb43c5f8d0ff8a77b!2sHyderabad%2C%20Pakistan!5e0!3m2!1sen!2s!4v1677677777777"
            width="100%" height="335" style="border:0;" allowfullscreen="" loading="fast"></iframe>
        </div>
      </div>
    </div>
  </section>
